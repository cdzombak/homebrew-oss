---
name: Update README

on:
  push:
    branches:
      - main
    paths:
      - "Formula/*.rb"
      - "Casks/*.rb"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Update README table
        run: |
          #!/bin/bash
          set -euo pipefail

          extract_field() {
            local file="$1"
            local field="$2"

            INPUT_FILE="$file" INPUT_FIELD="$field" ruby <<'RUBY'
          content = File.read(ENV.fetch("INPUT_FILE"))
          field = ENV.fetch("INPUT_FIELD")
          match = content.match(/#{Regexp.escape(field)}\s+["']([^"']*)["']/)
          puts(match ? match[1] : "")
          RUBY
          }

          emit_table() {
            local directory="$1"
            local install_prefix="$2"

            for package in "$directory"/*.rb; do
              if [[ -f "$package" ]]; then
                package_name=$(basename "$package" .rb)
                desc=$(extract_field "$package" "desc")
                homepage=$(extract_field "$package" "homepage")

                if [[ -z "$desc" ]]; then
                  desc="No description available"
                fi

                if [[ -n "$homepage" ]]; then
                  project_link="[$package_name]($homepage)"
                else
                  project_link="$package_name"
                fi

                echo "| $project_link | $desc | \`$install_prefix$package_name\` |"
              fi
            done | sort -f
          }

          {
          echo ""
          echo "### Formulae"
          echo ""
          echo "| Software | Description | Install Command |"
          echo "| -------- | ----------- | ---------------- |"
          emit_table "Formula" "brew install cdzombak/oss/"
          echo ""
          echo "### Casks"
          echo ""
          echo "| Software | Description | Install Command |"
          echo "| -------- | ----------- | ---------------- |"
          emit_table "Casks" "brew install --cask cdzombak/oss/"
          echo ""
          } > /tmp/new_table.md

      - name: Update README.md
        run: |
          #!/bin/bash
          set -euo pipefail

          # Create new README with updated table
          awk '
            /<!-- project_table_start -->/ {
              print $0
              system("cat /tmp/new_table.md")
              skip = 1
              next
            }
            /<!-- project_table_end -->/ {
              skip = 0
            }
            !skip
          ' README.md > README_new.md

          mv README_new.md README.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: update README.md software table

          🤖 Generated with GitHub Actions"
          git push
